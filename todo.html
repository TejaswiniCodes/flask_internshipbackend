<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Task Manager</title>
    <script>
        const API = "http://127.0.0.1:5000/api/tasks;">
    </script>
</head>
<style>
    body {
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        font-family: Arial, sans-serif;
        color: #1f2937;
    }
    h1, h2 {
        color: #4f46e5;
    }
    button {
        transition: 0.3s;
    }
    button:hover {
        transform: scale(1.05);
    }
    input, textarea {
        border: 1px solid #cbd5e1;
        outline: none;
    }
    input:focus, textarea:focus {
        border-color: #6366f1;
        box-shadow: 0 0 5px #a5b4fc;
    }
    .card {
        background: white;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .btn-primary {
        background: #4f46e5;
        color: white;
        padding: 8px 12px;
        border-radius: 8px;
        border: none;
    }
    .btn-primary:hover {
        background: #4338ca;
    }
    .completed {
        color: green;
        font-weight: bold;
    }
    .pending {
        color: orange;
        font-weight: bold;
    }
</style>
<body style="background-color: #f5f5f5;">
<div>
    <div>
        <div>
            Workspace Task Manager
        </div>
        <h1>
            Simple To-Do Application
        </h1>
        <button onclick="loadTasks()">
            Sync DB
        </button>
        <div>
            <div>
                <span>Total: <span id="total-count">0</span></span>
                <span>Pending: <span id="pending-count">0</span></span>
                <span>Completed: <span id="completed-count">0</span></span>
            </div>
            <div>
                <span id="progress-percent">0%</span> Done
            </div>
       </div>
       <div>
            <div style="width:100%; background:#eee; height:10px;">
                <div id="progress-bar" style="width:0%; background:blue; height:10px;"></div>
            </div>
       </div>
    </div>

    <div>

        <h2>Add New Task</h2>

        <input type="text" id="title" placeholder="Task title">

        <textarea id="description" placeholder="Description"></textarea>

        <button onclick="handleSave()">
            Save to Database
        </button>

    </div>

    <div>

        <input type="text" id="search" oninput="renderList()" placeholder="Search tasks...">

        <div>

            <button onclick="filterBy('All')">All</button>
            <button onclick="filterBy('Pending')">Pending</button>
            <button onclick="filterBy('Completed')">Completed</button>

            <select id="sort" onchange="renderList()">
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
            </select>

        </div>

    </div>

    <div id="task-container"></div>

</div>

</body>
    
    <script>
        let tasksArray = [];
        let activeFilter = 'All';

        // 1. GET: 
        function loadTasks() {
            fetch('/api/tasks')
                .then(response => response.json())
                .then(data => {
                    tasksArray = data;
                    renderList();
                })
                .catch(error => console.error('Error:', error));
        }

        // 2. POST: 
        function handleSave() {
            const titleInput = document.getElementById('title');
            const descInput = document.getElementById('description');

            if (!titleInput.value.trim()) {
                alert('Please enter a task title');
                return;
            }

            const payload = {
                title: titleInput.value,
                description: descInput.value
            };

            fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(() => {
                titleInput.value = '';
                descInput.value = '';
                loadTasks(); // లిస్ట్ అప్‌డేట్ చేయడానికి
            });
        }

        // 3. PUT 
        function toggleTaskStatus(id, currentStatus) {
            const nextStatus = currentStatus === 'Pending' ? 'Completed' : 'Pending';

            fetch(`/api/tasks/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: nextStatus })
            })
            .then(() => loadTasks());
        }

        // 4. DELETE
        function deleteTask(id) {
            if (confirm('Delete this task?')) {
                fetch(`/api/tasks/${id}`, { method: 'DELETE' })
                    .then(() => loadTasks());
            }
        }

       
        function filterBy(status) {
            activeFilter = status;
            
            
            ['All', 'Pending', 'Completed'].forEach(item => {
                const btn = document.getElementById(`btn-${item.toLowerCase()}`);
                if (item === status) {
                    btn.className = "px-3 py-1.5 rounded-lg text-xs font-semibold bg-indigo-600 text-white cursor-pointer";
                } else {
                    btn.className = "px-3 py-1.5 rounded-lg text-xs font-semibold bg-gray-100 text-gray-600 hover:bg-gray-200 cursor-pointer";
                }
            });
            
            renderList();
        }

        
        function renderList() {
            const container = document.getElementById('task-container');
            const searchQuery = document.getElementById('search').value.toLowerCase();
            const sortOrder = document.getElementById('sort').value;

            
            const total = tasksArray.length;
            const pending = tasksArray.filter(t => t.status === 'Pending').length;
            const completed = tasksArray.filter(t => t.status === 'Completed').length;
            const percent = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('total-count').innerText = total;
            document.getElementById('pending-count').innerText = pending;
            document.getElementById('completed-count').innerText = completed;
     </html>
